name: Domain Intelligence Daily Pipeline

on:
  push:
    branches:
      - main
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ingestion & scoring pipeline
        run: |
          cd ${{ github.workspace }}
          python -m pipeline.run_pipeline
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Generate top opportunities
        run: |
          cd ${{ github.workspace }}
          python -c "
          import sys; sys.path.insert(0, '.')
          from alerts.web_alert import generate_top_opportunities
          top = generate_top_opportunities(10)
          print(f'Generated {len(top)} top opportunities')
          "
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit updated dataset
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ logs/
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 Daily pipeline update: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
